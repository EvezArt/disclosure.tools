version: '3.9'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./corpus:/app/corpus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import gap_detector; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - PYTHONUNBUFFERED=1

